<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark backdrop circle to make it readable in light/dark browser tabs -->
  <circle cx="16" cy="16" r="15" fill="#020514" />
  <!-- Neon cyan outer bubble -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow)" />
  <!-- Neon purple/magenta breathing wave -->
  <path d="M9 16 C 12 11, 14 21, 16 16 C 18 11, 20 21, 23 16" fill="none" stroke="#bd00ff" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
  <!-- White bubble highlight -->
  <circle cx="12" cy="12" r="1.5" fill="#ffffff" opacity="0.9" />
</svg>
